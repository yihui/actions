name: 'setup-r-dependencies'
description: 'Install and cache R package dependencies using base R (no pak)'
author: 'Yihui Xie'

inputs:
  cache-version:
    description: 'Cache version; increment this number to clear the existing cache'
    required: true
    default: '1'
  dependencies:
    description: >
      Comma-separated list of DESCRIPTION field names whose packages should be
      installed. Valid values: Depends, Imports, LinkingTo, Suggests.
    required: true
    default: 'Depends, Imports, LinkingTo, Suggests'
  extra-packages:
    description: >
      Extra R packages to install beyond those found in DESCRIPTION
      (space- or comma-separated).
    default: ''
  working-directory:
    description: 'Working directory that contains the DESCRIPTION file.'
    default: '.'
  apt-packages:
    description: >
      System packages to install via apt-get on Linux (space-separated).
      Use this when the package names differ from those on other platforms.
    default: ''
  brew-packages:
    description: >
      System packages to install via Homebrew on macOS (space-separated).
      Use this when the package names differ from those on other platforms.
    default: ''
  choco-packages:
    description: >
      System packages to install via Chocolatey on Windows (space-separated).
      Use this when the package names differ from those on other platforms.
    default: ''

runs:
  using: 'composite'
  steps:
    # On Windows, Rtools ships its own zstd that is incompatible with the
    # zstd used by the GitHub Actions cache. Put the standalone zstd first
    # so both cache restore and cache save use the correct binary.
    - name: Adjust PATH to use the correct zstd on Windows
      if: runner.os == 'Windows'
      shell: bash
      run: echo 'C:/tools/zstd' >> "${GITHUB_PATH}"

    - name: Set up R library path
      shell: Rscript {0}
      run: |
        lib <- Sys.getenv("R_LIBS_USER")
        if (!nzchar(lib)) {
          lib <- file.path(normalizePath("~"), "R-library")
          cat(sprintf("R_LIBS_USER=%s\n", lib),
              file = Sys.getenv("GITHUB_ENV"), append = TRUE)
          message("Setting R_LIBS_USER to ", lib)
        } else {
          message("R_LIBS_USER is already set to ", lib)
        }
        dir.create(lib, recursive = TRUE, showWarnings = FALSE)

    - name: Install apt-get packages (Linux)
      if: runner.os == 'Linux' && inputs.apt-packages != ''
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ${{ inputs.apt-packages }}

    - name: Install Homebrew packages (macOS)
      if: runner.os == 'macOS' && inputs.brew-packages != ''
      shell: bash
      run: brew install ${{ inputs.brew-packages }}

    - name: Install Chocolatey packages (Windows)
      if: runner.os == 'Windows' && inputs.choco-packages != ''
      shell: bash
      run: choco install -y ${{ inputs.choco-packages }}

    - name: Get R version for cache key
      id: r-version
      shell: Rscript {0}
      run: |
        cat("r-version=",
            paste0(R.Version()$major, ".", R.Version()$minor), "\n",
            sep = "", file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)

    - name: Restore R package cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.R_LIBS_USER }}
        key: ${{ runner.os }}-r${{ steps.r-version.outputs.r-version }}-${{ inputs.cache-version }}-${{ hashFiles(format('{0}/DESCRIPTION', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-r${{ steps.r-version.outputs.r-version }}-${{ inputs.cache-version }}-

    - name: Install R dependencies
      shell: Rscript {0}
      working-directory: ${{ inputs.working-directory }}
      run: |
        cat("::group::Install R dependencies\n")
        if (!file.exists("DESCRIPTION")) {
          message("No DESCRIPTION file found; skipping dependency installation.")
          cat("::endgroup::\n")
          q("no")
        }
        desc <- read.dcf("DESCRIPTION")
        dep_types <- trimws(strsplit(
          "${{ inputs.dependencies }}", "[[:space:],]+"
        )[[1L]])
        dep_types <- dep_types[nzchar(dep_types)]

        pkgs <- character()
        for (field in dep_types) {
          if (field %in% colnames(desc)) {
            raw     <- desc[1L, field]
            entries <- strsplit(raw, ",")[[1L]]
            # Strip version constraints, e.g. "dplyr (>= 1.0.0)" -> "dplyr"
            entries <- trimws(gsub("\\s*\\([^)]*\\)", "", entries))
            entries <- entries[nzchar(entries) & entries != "R"]
            pkgs    <- c(pkgs, entries)
          }
        }

        extra <- trimws(strsplit(
          "${{ inputs.extra-packages }}", "[[:space:],]+"
        )[[1L]])
        extra <- extra[nzchar(extra)]
        pkgs  <- unique(c(pkgs, extra))

        installed <- rownames(installed.packages())
        pkgs      <- pkgs[!pkgs %in% installed]

        if (length(pkgs) > 0L) {
          message("Installing: ", paste(pkgs, collapse = ", "))
          install.packages(pkgs,
                           repos = "https://cloud.r-project.org",
                           lib   = Sys.getenv("R_LIBS_USER"))
        } else {
          message("All required packages are already installed.")
        }
        cat("::endgroup::\n")

    - name: Session info
      shell: Rscript {0}
      run: |
        cat("::group::Session info\n")
        print(sessionInfo())
        cat("::endgroup::\n")

    # Rtools35 ships tar 1.30 which is incompatible with the cache format used
    # by GitHub Actions. Switch to the tar that ships with Git for Windows
    # before the cache save step.
    - name: Fix tar on Windows (Rtools35 ships incompatible tar 1.30)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        if command -v /c/Rtools/bin/tar 2>/dev/null && \
           /c/Rtools/bin/tar --version 2>/dev/null | grep -q 'tar (GNU tar) 1.30'; then
          echo 'C:/Program Files/Git/usr/bin' >> "${GITHUB_PATH}"
        fi

    # Always save the cache so that partially-completed workflows can benefit
    # from previously installed packages on the next run.
    - name: Save R package cache
      if: always() && steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ env.R_LIBS_USER }}
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}
