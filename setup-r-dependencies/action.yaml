name: "setup-r-dependencies"
description: "Install and cache R package dependencies using base R (no pak)"
author: "Yihui Xie"

inputs:
  dependencies:
    description: >
      Comma-separated list of DESCRIPTION field names whose packages should be
      installed. Valid values: Depends, Imports, LinkingTo, Suggests.
    default: "Depends, Imports, LinkingTo, Suggests"
  extra-packages:
    description: >
      Extra R packages to install beyond those found in DESCRIPTION
      (space- or comma-separated).
    default: ""
  r-universe:
    description: >
      Names of R universe(s) to use for package installation (space- or
      comma-separated).
    default: ""
  working-directory:
    description: >
      Directory that contains the DESCRIPTION file. If empty (default),
      the first DESCRIPTION file found recursively from the repository root
      is used.
    default: ""
  system-packages:
    description: >
      System packages to install on all platforms: apt-get on Linux,
      Homebrew on macOS, and Chocolatey on Windows (space-separated).
    default: ""
  apt-packages:
    description: >
      Additional system packages to install via apt-get on Linux only
      (space-separated). Use when the package name differs between platforms.
    default: ""
  brew-packages:
    description: >
      Additional system packages to install via Homebrew on macOS only
      (space-separated). Use when the package name differs between platforms.
    default: ""
  choco-packages:
    description: >
      Additional system packages to install via Chocolatey on Windows only
      (space-separated). Use when the package name differs between platforms.
    default: ""
  cache-key-suffix:
    description: >
      Optional suffix appended to the cache key (with a '-' separator) to
      allow separate caches for different environments sharing the same OS and
      R version (e.g. container image, CPU architecture).
    default: ""

runs:
  using: "composite"
  steps:
    # On Windows, Rtools ships its own zstd that is incompatible with the
    # zstd used by the GitHub Actions cache. Put the standalone zstd first
    # so both cache restore and cache save use the correct binary.
    - name: Adjust PATH to use the correct zstd on Windows
      if: runner.os == 'Windows'
      shell: bash
      run: echo 'C:/tools/zstd' >> "${GITHUB_PATH}"

    - name: Set up R library path
      id: setup-r-libs
      shell: Rscript {0}
      run: |
        lib = Sys.getenv("R_LIBS_USER")
        if (lib == "") {
          lib = file.path(normalizePath("~"), "R-library")
          cat(sprintf("R_LIBS_USER=%s\n", lib),
              file = Sys.getenv("GITHUB_ENV"), append = TRUE)
          message("Setting R_LIBS_USER to ", lib)
        } else {
          message("R_LIBS_USER is already set to ", lib)
        }
        dir.create(lib, recursive = TRUE, showWarnings = FALSE)
        cat(sprintf("r-libs-user=%s\n", lib),
            file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)
        if (getRversion() <= '3.2.1') for (m in c('wget', 'curl')) if (Sys.which(m) != '') {
          cat(sprintf('\noptions(download.file.method = "%s")\n', m), file = '~/.Rprofile', append = TRUE)
          break
        }
        # Set default repos if not already set
        repo = setdiff(getOption("repos"), "@CRAN@")
        if (length(repo) == 0) repo = 'https://cloud.r-project.org'
        # Add r-universes
        univ = strsplit("${{ inputs.r-universe }}", "[ ,]")[[1]]
        univ = setdiff(gsub("^\\s+|\\s+$", "", univ), "")
        if (length(univ)) repo = c(if (Sys.info()['sysname'] == 'Linux' && Sys.which('lsb_release') != '') {
          r_branch = sub('^(\\d+\\.\\d+).*', '\\1', getRversion())
          distro = system2('lsb_release', '-sc', stdout = TRUE)
          sprintf("https://%s.r-universe.dev/bin/linux/%s-%s/%s", univ, distro, R.version$arch, r_branch)
        } else {
          sprintf('https://%s.r-universe.dev', univ)
        }, repo)
        # Set repos in .Rprofile
        cat(sprintf("options(repos = c('%s'))\n", paste(repo, collapse = "', '")), file = '~/.Rprofile', append = TRUE)
        message("Repos: ", paste(repo, collapse = ", "))

    - name: Find package directory
      id: pkg-dir
      shell: Rscript {0}
      run: |
        d = "${{ inputs.working-directory }}"
        if (d == "") {
          found = list.files(".", "^DESCRIPTION$", recursive = TRUE, full.names = TRUE)
          if (length(found) == 0L) q("no")
          d = dirname(found[[1L]])
        }
        d = normalizePath(d, winslash = "/")
        message("Package directory: ", d)
        cat(sprintf("pkg-dir=%s\n", d),
            file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)

    - name: Install apt-get packages (Linux)
      if: runner.os == 'Linux' && (inputs.system-packages != '' || inputs.apt-packages != '')
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ${{ inputs.system-packages }} ${{ inputs.apt-packages }}

    - name: Install Homebrew packages (macOS)
      if: runner.os == 'macOS' && (inputs.system-packages != '' || inputs.brew-packages != '')
      shell: bash
      run: brew install ${{ inputs.system-packages }} ${{ inputs.brew-packages }}

    - name: Install Chocolatey packages (Windows)
      if: runner.os == 'Windows' && (inputs.system-packages != '' || inputs.choco-packages != '')
      shell: bash
      run: choco install -y ${{ inputs.system-packages }} ${{ inputs.choco-packages }}

    - name: Get R version for cache key
      id: r-version
      shell: Rscript {0}
      run: |
        cat("r-version=",
            paste0(getRversion(), "-", R.version$platform), "\n",
            sep = "", file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)

    - name: Compute cache key
      id: cache-key
      shell: bash
      run: |
        BASE="r${{ steps.r-version.outputs.r-version }}-${{ strategy.job-index }}-${{ inputs.cache-key-suffix }}"
        PRIMARY="${BASE}-${{ github.run_id }}"
        echo "restore-key=${BASE}" >> "$GITHUB_OUTPUT"
        echo "primary-key=${PRIMARY}" >> "$GITHUB_OUTPUT"

    - name: Restore R package cache
      id: cache-restore
      uses: actions/cache/restore@HEAD
      with:
        path: ${{ steps.setup-r-libs.outputs.r-libs-user }}
        key: ${{ steps.cache-key.outputs.primary-key }}
        restore-keys: |
          ${{ steps.cache-key.outputs.restore-key }}

    - name: Install R dependencies
      id: install
      shell: Rscript {0}
      run: |
        # Install R dependencies
        lib = Sys.getenv("R_LIBS_USER")
        # Record state of the R_LIBS_USER directory before installing/updating
        lib_status = function() {
          desc = list.files(lib, "^DESCRIPTION$", recursive = TRUE, full.names = TRUE)
          tools::md5sum(desc)  # any change to DESCRIPTION files will trigger new cache
        }
        time_before = lib_status()

        pkg_dir = "${{ steps.pkg-dir.outputs.pkg-dir }}"
        if (nzchar(pkg_dir)) {
          desc_file = file.path(pkg_dir, "DESCRIPTION")
          desc = read.dcf(desc_file)
          dep_types = strsplit("${{ inputs.dependencies }}", "[[:space:],]+")[[1L]]
          dep_types = intersect(trimws(dep_types), colnames(desc))
          pkgs = unlist(strsplit(desc[1L, dep_types], ","))
          # Strip version constraints, e.g. "xfun (>= 0.1)" -> "xfun"
          pkgs = gsub("\\s+", "", gsub("\\([^)]*\\)", "", pkgs))
        } else {
          pkgs = desc = desc_file = NULL
          message("No DESCRIPTION file found in the repository.")
        }

        extra = strsplit("${{ inputs.extra-packages }}", "[[:space:],]+")[[1L]]
        pkgs  = setdiff(c(pkgs, extra), c("", "R"))
        if (install_self <- ("." %in% pkgs)) pkgs = setdiff(pkgs, ".")

        # Skip help pages for R < 4.0
        install = function(pkgs, ..., .msg = "Installing") if (length(pkgs)) {
          message(.msg, ": ", paste(pkgs, collapse = " "))
          install.packages(pkgs, lib, ..., INSTALL_opts = if (getRversion() < "4.0") "--no-help" else list())
        }

        # Packages containing '/' will be installed via remotes
        pkgs_gh = grep('/', pkgs, value = TRUE)
        # Same for packages in the Remotes field of DESCRIPTION
        if ('Remotes' %in% colnames(desc)) {
          pkgs_gh = c(pkgs_gh, strsplit(desc[1L, 'Remotes'], "[[:space:],]+")[[1L]])
        }
        if (length(pkgs_gh <- setdiff(pkgs_gh, ''))) {
          if (!requireNamespace("remotes", quietly = TRUE)) install("remotes")
          remotes::install_github(pkgs_gh, lib = lib)
          pkgs = setdiff(pkgs, pkgs_gh)
        }

        # Find out all recursive dependencies
        pkgs = c(pkgs, tools::package_dependencies(pkgs, db = available.packages(), recursive = TRUE))
        pkgs = unique(unlist(pkgs))

        # Install missing packages
        installed = rownames(installed.packages())
        install(setdiff(pkgs, installed))

        # Update outdated packages
        old_pkgs = function() rownames(old.packages(lib.loc = lib, checkBuilt = TRUE))
        install(old_pkgs(), .msg = "Updating")
        # old.packages() may find newer source versions but install.packages()
        # may still install older binary versions, so check again
        if (length(old <- old_pkgs())) {
          install(old, type = "source", .msg = "Updating (source versions)")
        }

        # Record state of the R_LIBS_USER directory after installing/updating
        time_after = lib_status()

        # Determine whether the library directory changed
        packages_changed = !identical(time_before, time_after)
        cat(sprintf("packages-changed=%s\n", tolower(packages_changed)),
            file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)
        if (!packages_changed) message("All required packages are already up to date.")

        if (install_self) {
          install(dirname(desc_file), repos = NULL, type = "source")
        }

    - name: Session info
      shell: Rscript {0}
      run: |
        sessionInfo()
        options(width = 300)
        noquote(installed.packages()[, c('LibPath', 'Version', 'Built')])

    # Rtools35 ships tar 1.30 which is incompatible with the cache format used
    # by GitHub Actions. Switch to the tar that ships with Git for Windows
    # before the cache save step.
    - name: Fix tar on Windows (Rtools35 ships incompatible tar 1.30)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        if command -v /c/Rtools/bin/tar 2>/dev/null && \
           /c/Rtools/bin/tar --version 2>/dev/null | grep -q 'tar (GNU tar) 1.30'; then
          echo 'C:/Program Files/Git/usr/bin' >> "${GITHUB_PATH}"
        fi

    # Always save the cache when packages were installed or updated so that
    # subsequent runs (including after failures) benefit from the work done here.
    - name: Save R package cache
      if: always() && steps.install.outputs.packages-changed == 'true'
      uses: actions/cache/save@HEAD
      with:
        path: ${{ steps.setup-r-libs.outputs.r-libs-user }}
        key: ${{ steps.cache-key.outputs.primary-key }}-${{ github.run_attempt }}
