name: 'check-r-package'
description: 'Check an R package using R CMD build and R CMD check'
author: 'Yihui Xie'

inputs:
  build-args:
    description: 'Extra arguments passed to R CMD build (e.g. "--no-build-vignettes").'
    default: '--no-build-vignettes'
  check-args:
    description: 'Extra arguments passed to R CMD check (e.g. "--no-manual --as-cran").'
    default: '--no-manual'
  check-dir:
    description: 'Directory (relative to working-directory) where check output is written.'
    default: 'check'
  working-directory:
    description: 'Working directory containing the R package source.'
    default: '.'
  upload-results:
    description: >
      When to upload check results as a workflow artifact. Accepted values:
      "failure" (default) — upload only when the check step fails;
      "always" — always upload;
      "never" — never upload.
    default: 'failure'
  artifact-name:
    description: >
      Name for the check-results artifact. Defaults to
      "<OS>-r-check-results".
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Build R package
      id: build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Ensure LOGNAME is set (some macOS and container environments omit it,
        # which causes R to emit warnings).
        export LOGNAME="${LOGNAME:-${GITHUB_ACTOR:-runner}}"

        echo "::group::R CMD build"
        R CMD build ${{ inputs.build-args }} .
        echo "::endgroup::"

        tarball=$(ls -t *.tar.gz 2>/dev/null | head -1)
        if [ -z "${tarball}" ]; then
          echo "::error::R CMD build did not produce a .tar.gz file."
          exit 1
        fi
        echo "tarball=${tarball}" >> "${GITHUB_OUTPUT}"

    - name: Check R package
      id: check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        export LOGNAME="${LOGNAME:-${GITHUB_ACTOR:-runner}}"

        # Match the behaviour of a clean CRAN submission check environment.
        export _R_CHECK_FORCE_SUGGESTS_="${_R_CHECK_FORCE_SUGGESTS_:-false}"
        export _R_CHECK_CRAN_INCOMING_="${_R_CHECK_CRAN_INCOMING_:-false}"

        mkdir -p "${{ inputs.check-dir }}"

        echo "::group::R CMD check"
        R CMD check ${{ inputs.check-args }} \
          --output="${{ inputs.check-dir }}" \
          "${{ steps.build.outputs.tarball }}"
        echo "::endgroup::"

    - name: Show testthat output
      if: always()
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "::group::testthat output"
        find "${{ inputs.check-dir }}" -name 'testthat.Rout*' \
          -exec echo "==> {}" \; -exec cat '{}' \; 2>/dev/null || true
        echo "::endgroup::"

    - name: Upload check results
      if: >-
        always() && (
          (failure() && inputs.upload-results != 'never') ||
          inputs.upload-results == 'always'
        )
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name || format('{0}-r-check-results', runner.os) }}
        path: ${{ inputs.working-directory }}/${{ inputs.check-dir }}
        if-no-files-found: ignore
